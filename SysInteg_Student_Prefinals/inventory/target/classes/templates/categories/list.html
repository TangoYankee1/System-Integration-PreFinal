<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Categories')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0"><i class="bi bi-tags me-2 text-success"></i>Categories</h4>
        <a th:href="@{/categories/new}" class="btn btn-success"><i class="bi bi-plus-lg me-1"></i>Add Category</a>
    </div>
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" th:text="${success}"><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
    <div class="row g-3">
        <div class="col-md-4" th:each="c : ${categories}">
            <div class="card border-0 shadow-sm">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="fw-bold mb-1" th:text="${c.name}">Name</h6>
                        <small class="text-muted" th:text="${c.description}">Description</small>
                    </div>
                    <div class="d-flex gap-2">
                        <a th:href="@{/categories/edit/{id}(id=${c.id})}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-pencil"></i></a>
                        <form th:action="@{/categories/delete/{id}(id=${c.id})}" method="post" class="d-inline" onsubmit="return confirm('Delete?')">
                            <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-12 text-center text-muted py-4" th:if="${categories.isEmpty()}">No categories yet.</div>
    </div>
</div>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
