<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Suppliers')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0"><i class="bi bi-truck me-2 text-purple"></i>Suppliers</h4>
        <a th:href="@{/suppliers/new}" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Add Supplier</a>
    </div>
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" th:text="${success}"><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-header">
                    <tr><th>Name</th><th>Email</th><th>Phone</th><th>Address</th><th>Actions</th></tr>
                </thead>
                <tbody>
                    <tr th:each="s : ${suppliers}">
                        <td class="fw-semibold" th:text="${s.name}">Name</td>
                        <td th:text="${s.email}">email</td>
                        <td th:text="${s.phone}">phone</td>
                        <td class="text-muted small" th:text="${s.address}">address</td>
                        <td>
                            <a th:href="@{/suppliers/edit/{id}(id=${s.id})}" class="btn btn-sm btn-outline-secondary me-1"><i class="bi bi-pencil"></i></a>
                            <form th:action="@{/suppliers/delete/{id}(id=${s.id})}" method="post" class="d-inline" onsubmit="return confirm('Delete?')">
                                <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${suppliers.isEmpty()}">
                        <td colspan="5" class="text-center text-muted py-4">No suppliers yet.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
