<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Products')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0"><i class="bi bi-box-seam me-2 text-primary"></i>Products</h4>
        <a th:href="@{/products/new}" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Add Product</a>
    </div>
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" th:text="${success}"><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
    <form th:action="@{/products}" method="get" class="mb-4 d-flex gap-2">
        <input type="text" name="search" class="form-control" placeholder="Search by name or SKU..." th:value="${search}"/>
        <button class="btn btn-outline-dark px-4">Search</button>
        <a th:href="@{/products}" class="btn btn-outline-secondary">Clear</a>
    </form>
    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-header">
                    <tr><th>SKU</th><th>Name</th><th>Category</th><th>Supplier</th><th>Price</th><th>Stock</th><th>Status</th><th>Actions</th></tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${products}">
                        <td><code th:text="${p.sku}">SKU</code></td>
                        <td><a th:href="@{/products/{id}(id=${p.id})}" th:text="${p.name}" class="fw-semibold link-dark text-decoration-none">Name</a></td>
                        <td><span class="badge bg-light text-dark border" th:text="${p.category?.name}">Cat</span></td>
                        <td class="text-muted small" th:text="${p.supplier?.name}">Supplier</td>
                        <td th:text="'₱' + ${#numbers.formatDecimal(p.price,1,2)}">₱0</td>
                        <td class="fw-semibold" th:text="${p.stockQuantity}">0</td>
                        <td>
                            <span th:if="${p.stockQuantity == 0}" class="badge bg-danger">Out of Stock</span>
                            <span th:if="${p.stockQuantity > 0 and p.isLowStock()}" class="badge bg-warning text-dark">Low Stock</span>
                            <span th:if="${p.stockQuantity > 0 and !p.isLowStock()}" class="badge bg-success">In Stock</span>
                        </td>
                        <td>
                            <a th:href="@{/products/edit/{id}(id=${p.id})}" class="btn btn-sm btn-outline-secondary me-1"><i class="bi bi-pencil"></i></a>
                            <form th:action="@{/products/delete/{id}(id=${p.id})}" method="post" class="d-inline" onsubmit="return confirm('Delete this product?')">
                                <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${products.isEmpty()}">
                        <td colspan="8" class="text-center text-muted py-5"><i class="bi bi-inbox me-2"></i>No products found.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
