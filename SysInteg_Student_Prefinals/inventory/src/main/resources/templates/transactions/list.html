<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Transactions')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0"><i class="bi bi-arrow-left-right me-2 text-primary"></i>Stock Transactions</h4>
        <a th:href="@{/transactions/new}" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>New Movement</a>
    </div>
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" th:text="${success}"><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" th:text="${error}"><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-header">
                    <tr><th>#</th><th>Product</th><th>SKU</th><th>Type</th><th>Qty</th><th>Reason</th><th>Date</th></tr>
                </thead>
                <tbody>
                    <tr th:each="tx : ${transactions}">
                        <td class="text-muted small" th:text="${tx.id}">1</td>
                        <td th:text="${tx.product?.name}">Product</td>
                        <td><code class="small" th:text="${tx.product?.sku}">SKU</code></td>
                        <td>
                            <span th:class="${tx.type.name() == 'STOCK_IN' ? 'badge bg-success' : 'badge bg-danger'}"
                                  th:text="${tx.type.name() == 'STOCK_IN' ? '▲ STOCK IN' : '▼ STOCK OUT'}">IN</span>
                        </td>
                        <td class="fw-semibold" th:text="${tx.quantity}">0</td>
                        <td class="text-muted small" th:text="${tx.reason != null ? tx.reason : '—'}">—</td>
                        <td><small th:text="${#temporals.format(tx.transactionDate,'MMM d, yyyy HH:mm')}">Date</small></td>
                    </tr>
                    <tr th:if="${transactions.isEmpty()}">
                        <td colspan="7" class="text-center text-muted py-5">No transactions recorded yet.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
