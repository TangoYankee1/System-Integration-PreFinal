<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title} + ' — InventoryMS'">InventoryMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="bi bi-boxes me-2"></i>InventoryMS
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto ms-3">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/products}">
                        <i class="bi bi-box-seam me-1"></i>Products
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/categories}">
                        <i class="bi bi-tags me-1"></i>Categories
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/suppliers}">
                        <i class="bi bi-truck me-1"></i>Suppliers
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/transactions}">
                        <i class="bi bi-arrow-left-right me-1"></i>Transactions
                    </a>
                </li>
            </ul>
            <a class="btn btn-accent btn-sm" th:href="@{/transactions/new}">
                <i class="bi bi-plus-lg me-1"></i>Stock Movement
            </a>
        </div>
    </div>
</nav>

<footer th:fragment="footer" class="footer-bar text-center py-3 mt-5">
    <small class="text-muted">InventoryMS &mdash; Spring Boot + MySQL Student Project</small>
</footer>

</body>
</html>
