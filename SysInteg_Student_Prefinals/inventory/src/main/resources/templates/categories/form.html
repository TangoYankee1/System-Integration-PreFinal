<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Category Form')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container py-5" style="max-width:500px">
    <h4 class="fw-bold mb-4" th:text="${category.id == null ? 'Add Category' : 'Edit Category'}">Form</h4>
    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
            <form th:action="@{/categories/save}" th:object="${category}" method="post">
                <input type="hidden" th:field="*{id}"/>
                <div class="mb-3">
                    <label class="form-label">Name <span class="text-danger">*</span></label>
                    <input type="text" th:field="*{name}" class="form-control"/>
                    <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Description</label>
                    <input type="text" th:field="*{description}" class="form-control"/>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success px-4">Save</button>
                    <a th:href="@{/categories}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
